<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Student Mentor</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <span>🎓 Student Mentor</span>
    </div>

    <!-- Chat area -->
    <div id="chat" class="chat">
      <div class="message mentor">
        Hi! I’m your mentor.  
        Ask me about the problem you’re solving 🙂
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <input
        type="text"
        id="userInput"
        placeholder="Ask a question about this problem..."
      />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
